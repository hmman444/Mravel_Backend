name: Build & Deploy Backend

# Build every service image, push to GHCR, then tell the VPS to pull & restart.
# Adjust the branch below to whatever you actually deploy from (this repo uses dev_luan).
on:
  push:
    branches: [main, dev_luan]
  workflow_dispatch:

concurrency:
  group: backend-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { service: auth-service,        context: ".", file: services/auth-service/Dockerfile }
          - { service: user-service,        context: ".", file: services/user-service/Dockerfile }
          - { service: catalog-service,     context: ".", file: services/catalog-service/Dockerfile }
          - { service: booking-service,     context: ".", file: services/booking-service/Dockerfile }
          - { service: admin-service,       context: ".", file: services/admin-service/Dockerfile }
          - { service: plan-service,        context: ".", file: services/plan-service/Dockerfile }
          - { service: partner-service,     context: ".", file: services/partner-service/Dockerfile }
          - { service: notification-service,context: ".", file: services/notification-service/Dockerfile }
          - { service: review-service,      context: ".", file: services/review-service/Dockerfile }
          - { service: realtime-service,    context: ".", file: services/realtime-service/Dockerfile }
          - { service: chat-service,        context: ".", file: services/chat-service/Dockerfile }
          - { service: ai-plan-service,     context: services/ai-plan-service, file: services/ai-plan-service/Dockerfile }
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase owner
        id: own
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: |
            ghcr.io/${{ steps.own.outputs.owner }}/mravel-${{ matrix.service }}:latest
            ghcr.io/${{ steps.own.outputs.owner }}/mravel-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on VPS over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          command_timeout: 20m
          script: |
            cd ${{ secrets.DEPLOY_DIR }}
            ./scripts/deploy.sh
