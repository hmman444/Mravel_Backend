server:
  port: 8084

spring:
  application:
    name: booking-service

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME:${MYSQL_USER:root}}
    password: ${SPRING_DATASOURCE_PASSWORD:${MYSQL_ROOT_PASSWORD}}
    driver-class-name: com.mysql.cj.jdbc.Driver

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

jwt:
  secret: ${JWT_SECRET:mravel-super-secret-key-should-be-at-least-32-characters}

mravel:
  services:
    auth:
      base-url: http://gateway:8080
      validate-path: /api/auth/validate
    catalog:
      base-url: http://gateway:8080
    notification:
      base-url: http://gateway:8080

  frontend:
    base-url: ${MRAVEL_FRONTEND_BASE_URL:https://mravel.info.vn}

  payment:
    vnpay:
      base-url: "https://sandbox.vnpayment.vn/paymentv2/vpcpay.html"
      tmn-code: ${VNPAY_TMN_CODE:YM8LV0DC}
      hash-secret: ${VNPAY_HASH_SECRET:}

      return-url: ${MRAVEL_PAYMENT_VNPAY_RETURN_URL:https://mravel.info.vn/api/payment/vnpay/return}
      ipn-url: ${MRAVEL_PAYMENT_VNPAY_IPN_URL:https://mravel.info.vn/api/payment/vnpay/ipn}

    momo:
      redirect-url: ${MRAVEL_PAYMENT_MOMO_REDIRECT_URL:https://mravel.info.vn/api/payment/momo/redirect}
      ipn-url: ${MRAVEL_PAYMENT_MOMO_IPN_URL:https://mravel.info.vn/api/payment/momo/ipn}
