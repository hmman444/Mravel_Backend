server:
  port: 8083

spring:
  application:
    name: catalog-service

  elasticsearch:
    uris: ${ELASTICSEARCH_URI:http://elasticsearch:9200}
    connection-timeout: 5s
    socket-timeout: 30s

  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:${MONGO_URI:mongodb://mongo:27017/mravel}}
      auto-index-creation: true

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}

catalog:
  search:
    engine: ${CATALOG_SEARCH_ENGINE:elasticsearch}
    reindex-on-startup-if-empty: ${CATALOG_SEARCH_REINDEX_ON_STARTUP_IF_EMPTY:true}

mravel:
  services:
    auth:
      base-url: http://gateway:8080
      validate-path: /api/auth/validate
    user:
      base-url: http://gateway:8080
