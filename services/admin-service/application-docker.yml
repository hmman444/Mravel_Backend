server:
  port: 8085

spring:
  application:
    name: admin-service
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

mravel:
  services:
    auth:
      base-url: http://gateway:8080
      validate-path: /api/auth/validate
    user:
      base-url: http://gateway:8080
    catalog:
      base-url: http://gateway:8080
    plan:
      base-url: http://gateway:8080

logging:
  level:
    org.springframework.security: INFO
    org.springframework.web: INFO
